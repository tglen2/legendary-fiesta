<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Cupboard Organizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #fdf6ee; color: #3d2b1f; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #c0392b, #e67e22);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header span { font-size: 1.8rem; }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 16px 20px;
    background: #fff8f2;
    border-bottom: 1px solid #f0dcc8;
    align-items: center;
  }
  .toolbar input {
    flex: 1; min-width: 160px;
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.9rem;
    background: white;
  }
  .toolbar select {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.9rem;
    background: white;
    cursor: pointer;
  }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #c0392b; color: white; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-add-cupboard { background: #e67e22; color: white; }
  .btn-add-cupboard:hover { opacity: 0.88; }

  .stats {
    display: flex; flex-wrap: wrap; gap: 12px;
    padding: 16px 20px;
  }
  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 12px 18px;
    flex: 1; min-width: 120px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 4px solid #e67e22;
    text-align: center;
  }
  .stat-card .num { font-size: 1.6rem; font-weight: 700; color: #c0392b; }
  .stat-card .lbl { font-size: 0.75rem; color: #888; margin-top: 2px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
    padding: 16px 20px 32px;
  }

  .cupboard {
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .cupboard:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.13); }

  .cupboard-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }
  .cupboard-header .left { display: flex; align-items: center; gap: 8px; }
  .cupboard-header .icon { font-size: 1.4rem; }
  .cupboard-header .name { font-weight: 700; font-size: 1rem; }
  .cupboard-header .count {
    font-size: 0.72rem; background: rgba(255,255,255,0.35);
    border-radius: 20px; padding: 2px 8px; font-weight: 600;
  }
  .cupboard-header .chevron { font-size: 0.8rem; transition: transform 0.25s; }
  .cupboard-header .chevron.open { transform: rotate(180deg); }

  .cupboard-body { padding: 0 14px 14px; }

  .items-list { list-style: none; margin-bottom: 10px; }
  .items-list li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid #f5ebe0;
    font-size: 0.88rem;
  }
  .items-list li:last-child { border-bottom: none; }
  .item-left { display: flex; align-items: center; gap: 8px; }
  .item-tag {
    font-size: 0.68rem; padding: 2px 7px;
    border-radius: 20px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .tag-dry { background: #fdebd0; color: #d35400; }
  .tag-canned { background: #d5f5e3; color: #1e8449; }
  .tag-spice { background: #e8daef; color: #7d3c98; }
  .tag-snack { background: #fef9e7; color: #b7950b; }
  .tag-baking { background: #d6eaf8; color: #1a5276; }
  .tag-other { background: #f2f3f4; color: #555; }

  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 1rem; padding: 2px 5px;
    border-radius: 4px; transition: color 0.15s;
  }
  .del-btn:hover { color: #c0392b; }

  .add-item-row {
    display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
  }
  .add-item-row input {
    flex: 1; min-width: 80px;
    padding: 6px 10px;
    border: 1px solid #eee;
    border-radius: 7px;
    font-size: 0.82rem;
  }
  .add-item-row select {
    padding: 6px 8px;
    border: 1px solid #eee;
    border-radius: 7px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .add-item-row .btn-sm {
    padding: 6px 12px;
    font-size: 0.82rem;
    border: none; border-radius: 7px;
    background: #e67e22; color: white;
    font-weight: 600; cursor: pointer;
  }

  .del-cupboard-btn {
    background: none; border: none; cursor: pointer;
    font-size: 0.8rem; color: rgba(255,255,255,0.7);
    padding: 3px 6px; border-radius: 5px; transition: color 0.15s;
  }
  .del-cupboard-btn:hover { color: white; }

  .empty-msg { color: #bbb; font-size: 0.82rem; text-align: center; padding: 10px 0; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; border-radius: 16px;
    padding: 24px; width: 90%; max-width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h2 { font-size: 1.1rem; margin-bottom: 16px; }
  .modal input, .modal select {
    width: 100%; padding: 9px 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 0.9rem; margin-bottom: 12px;
  }
  .color-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .color-opt {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: border-color 0.15s;
  }
  .color-opt.selected { border-color: #333; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }

  @media(max-width:500px){
    .toolbar { flex-direction: column; }
    .toolbar input { min-width: unset; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <span>🍽️</span>
  <div>
    <h1>Kitchen Cupboard Organizer</h1>
    <div style="font-size:0.78rem;opacity:0.85">Track & organize everything in your kitchen</div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 Search items..." oninput="render()">
  <select id="filterTag" onchange="render()">
    <option value="">All Categories</option>
    <option value="dry">Dry Goods</option>
    <option value="canned">Canned</option>
    <option value="spice">Spices</option>
    <option value="snack">Snacks</option>
    <option value="baking">Baking</option>
    <option value="other">Other</option>
  </select>
  <button class="btn btn-add-cupboard" onclick="openModal()">+ Add Cupboard</button>
  <button class="btn" style="background:#2c3e50;color:white" onclick="downloadHTML()">⬇️ Download HTML</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>🗄️ New Cupboard</h2>
    <input type="text" id="newName" placeholder="Cupboard name (e.g. Pantry Top Shelf)">
    <div style="font-size:0.82rem;color:#888;margin-bottom:6px">Pick a color:</div>
    <div class="color-options" id="colorOptions"></div>
    <div id="iconRow" style="margin-bottom:14px">
      <div style="font-size:0.82rem;color:#888;margin-bottom:6px">Pick an icon:</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="iconPicker"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" style="background:#eee;color:#555" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addCupboard()">Add Cupboard</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  {bg:'#c0392b',text:'white'},{bg:'#e67e22',text:'white'},{bg:'#27ae60',text:'white'},
  {bg:'#2980b9',text:'white'},{bg:'#8e44ad',text:'white'},{bg:'#16a085',text:'white'},
  {bg:'#d35400',text:'white'},{bg:'#2c3e50',text:'white'}
];
const ICONS = ['🗄️','🫙','🧂','🍫','🥫','🍞','🌿','☕','🥣','🍵','🧁','🥡'];

const DEFAULT_CUPBOARDS = [
  { id:1, name:'Upper Left — Everyday', color:COLORS[0], icon:'🗄️', open:true,
    items:[
      {id:1,name:'Pasta',tag:'dry'},{id:2,name:'Rice',tag:'dry'},
      {id:3,name:'Lentils',tag:'dry'},{id:4,name:'Oats',tag:'dry'}
    ]
  },
  { id:2, name:'Upper Right — Canned Goods', color:COLORS[2], icon:'🥫', open:true,
    items:[
      {id:5,name:'Tomato Sauce',tag:'canned'},{id:6,name:'Chickpeas',tag:'canned'},
      {id:7,name:'Tuna',tag:'canned'},{id:8,name:'Kidney Beans',tag:'canned'}
    ]
  },
  { id:3, name:'Spice Cabinet', color:COLORS[4], icon:'🧂', open:true,
    items:[
      {id:9,name:'Paprika',tag:'spice'},{id:10,name:'Cumin',tag:'spice'},
      {id:11,name:'Turmeric',tag:'spice'},{id:12,name:'Oregano',tag:'spice'},
      {id:13,name:'Cinnamon',tag:'spice'}
    ]
  },
  { id:4, name:'Baking Shelf', color:COLORS[1], icon:'🧁', open:true,
    items:[
      {id:14,name:'All-purpose Flour',tag:'baking'},{id:15,name:'Sugar',tag:'baking'},
      {id:16,name:'Baking Soda',tag:'baking'},{id:17,name:'Cocoa Powder',tag:'baking'}
    ]
  },
  { id:5, name:'Snack Cupboard', color:COLORS[5], icon:'🍫', open:true,
    items:[
      {id:18,name:'Crackers',tag:'snack'},{id:19,name:'Granola Bars',tag:'snack'},
      {id:20,name:'Nuts Mix',tag:'snack'}
    ]
  }
];

let selectedColor = 0, selectedIcon = 0;
let cupboards = JSON.parse(localStorage.getItem('cupboards')) || DEFAULT_CUPBOARDS;
let nextId = Number(localStorage.getItem('nextId')) || 100;

function saveData() {
  localStorage.setItem('cupboards', JSON.stringify(cupboards));
  localStorage.setItem('nextId', nextId);
}

function tagLabel(t) {
  const map = {dry:'Dry Goods',canned:'Canned',spice:'Spice',snack:'Snack',baking:'Baking',other:'Other'};
  return map[t]||'Other';
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const ft = document.getElementById('filterTag').value;

  const total = cupboards.reduce((a,c)=>a+c.items.length,0);
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="num">${cupboards.length}</div><div class="lbl">Cupboards</div></div>
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total Items</div></div>
    <div class="stat-card"><div class="num">${[...new Set(cupboards.flatMap(c=>c.items.map(i=>i.tag)))].length}</div><div class="lbl">Categories</div></div>
    <div class="stat-card"><div class="num">${cupboards.filter(c=>c.items.length===0).length}</div><div class="lbl">Empty Cupboards</div></div>
  `;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  cupboards.forEach(cup => {
    const filtered = cup.items.filter(i => {
      const matchQ = !q || i.name.toLowerCase().includes(q);
      const matchT = !ft || i.tag === ft;
      return matchQ && matchT;
    });

    const cupboardNameMatch = !q || cup.name.toLowerCase().includes(q);
    if ((q || ft) && filtered.length === 0 && !cupboardNameMatch) return;

    const card = document.createElement('div');
    card.className = 'cupboard';

    const itemsHtml = filtered.length > 0
      ? filtered.map(item => `
          <li>
            <div class="item-left">
              <span class="item-tag tag-${item.tag}">${tagLabel(item.tag)}</span>
              ${item.name}
            </div>
            <button class="del-btn" onclick="delItem(${cup.id},${item.id})" title="Remove">✕</button>
          </li>
        `).join('')
      : `<li><div class="empty-msg">${q||ft?'No matches':'No items yet'}</div></li>`;

    card.innerHTML = `
      <div class="cupboard-header" style="background:${cup.color.bg};color:${cup.color.text}" onclick="toggleCupboard(${cup.id})">
        <div class="left">
          <span class="icon">${cup.icon}</span>
          <span class="name">${cup.name}</span>
          <span class="count">${cup.items.length} items</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button class="del-cupboard-btn" onclick="event.stopPropagation();delCupboard(${cup.id})" title="Delete cupboard">🗑️</button>
          <span class="chevron ${cup.open?'open':''}">▼</span>
        </div>
      </div>
      ${cup.open ? `
      <div class="cupboard-body">
        <ul class="items-list">${itemsHtml}</ul>
        <div class="add-item-row">
          <input type="text" id="inp-${cup.id}" placeholder="Add item..." onkeydown="if(event.key==='Enter')addItem(${cup.id})">
          <select id="tag-${cup.id}">
            <option value="dry">Dry</option>
            <option value="canned">Canned</option>
            <option value="spice">Spice</option>
            <option value="snack">Snack</option>
            <option value="baking">Baking</option>
            <option value="other">Other</option>
          </select>
          <button class="btn-sm" onclick="addItem(${cup.id})">+ Add</button>
        </div>
      </div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function toggleCupboard(id) {
  const c = cupboards.find(x=>x.id===id);
  if(c) {
    c.open = !c.open;
    saveData();
  }
  render();
}

function addItem(cid) {
  const inp = document.getElementById(`inp-${cid}`);
  const tagEl = document.getElementById(`tag-${cid}`);
  const name = inp.value.trim();
  if(!name) return;
  const cup = cupboards.find(c=>c.id===cid);
  cup.items.push({id:nextId++, name, tag:tagEl.value});
  inp.value = '';
  saveData();
  render();
}

function delItem(cid, iid) {
  const cup = cupboards.find(c=>c.id===cid);
  cup.items = cup.items.filter(i=>i.id!==iid);
  saveData();
  render();
}

function delCupboard(id) {
  if(!confirm('Delete this cupboard and all its items?')) return;
  cupboards = cupboards.filter(c=>c.id!==id);
  saveData();
  render();
}

function openModal() {
  buildModalPickers();
  document.getElementById('newName').value = '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function buildModalPickers() {
  const co = document.getElementById('colorOptions');
  co.innerHTML = COLORS.map((c,i)=>`
    <div class="color-opt ${i===selectedColor?'selected':''}" 
      style="background:${c.bg}" onclick="selectColor(${i})"></div>
  `).join('');
  const ip = document.getElementById('iconPicker');
  ip.innerHTML = ICONS.map((ic,i)=>`
    <span style="font-size:1.5rem;cursor:pointer;padding:4px;border-radius:8px;
      background:${i===selectedIcon?'#f0dcc8':'transparent'}" onclick="selectIcon(${i})">${ic}</span>
  `).join('');
}
function selectColor(i){ selectedColor=i; buildModalPickers(); }
function selectIcon(i){ selectedIcon=i; buildModalPickers(); }

function addCupboard() {
  const name = document.getElementById('newName').value.trim();
  if(!name) { alert('Please enter a cupboard name.'); return; }
  cupboards.push({
    id: nextId++, name, open: true,
    color: COLORS[selectedColor],
    icon: ICONS[selectedIcon],
    items: []
  });
  saveData();
  closeModal();
  render();
}

document.getElementById('modal').addEventListener('click', e => {
  if(e.target===document.getElementById('modal')) closeModal();
});

render();

function downloadHTML() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kitchen-organizer.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
